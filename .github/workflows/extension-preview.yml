name: globe-ai-preview

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths:
      - "apps/globe-ai/**"
      - "packages/ui/**"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - "tsconfig.json"
      - "tsconfig.base.json"
      - ".github/workflows/extension-preview.yml"

concurrency:
  group: globe-ai-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  BUN_VERSION: "1.3.12"
  VERCEL_VERSION: "53.2.0"
  COMMENT_MARKER: "<!-- globe-ai-preview-comment -->"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install workspace dependencies
        run: bun install

      - name: Deploy globe-ai preview to Vercel
        id: vercel-deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_CLI_VERSION: ${{ env.VERCEL_VERSION }}
        run: |
          set -euo pipefail
          CLI="bunx --bun vercel@${VERCEL_CLI_VERSION}"

          $CLI pull --yes --environment=preview --token="$VERCEL_TOKEN" --scope="$VERCEL_ORG_ID" --cwd apps/globe-ai
          $CLI build --token="$VERCEL_TOKEN" --scope="$VERCEL_ORG_ID" --cwd apps/globe-ai
          DEPLOY_URL=$($CLI deploy --prebuilt --token="$VERCEL_TOKEN" --scope="$VERCEL_ORG_ID" --cwd apps/globe-ai | tail -n1)

          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Comment PR with preview URL
        if: always()
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.vercel-deploy.outputs.deploy_url }}
          DEPLOY_OUTCOME: ${{ steps.vercel-deploy.outcome }}
          MARKER: ${{ env.COMMENT_MARKER }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { DEPLOY_URL, DEPLOY_OUTCOME, MARKER } = process.env;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = DEPLOY_OUTCOME === 'success'
              ? `${MARKER}\n## globe-ai preview\n\nPreview deployment: ${DEPLOY_URL}`
              : `${MARKER}\n## globe-ai preview\n\nDeployment failed. See [workflow run](${runUrl}).`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
